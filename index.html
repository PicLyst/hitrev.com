<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hit Rev Enterprises</title>
  <meta name="description" content="Hit Rev Enterprises builds PicLyst." />
  <style>
    body { font-family: -apple-system, system-ui, Segoe UI, Roboto, Helvetica, Arial, sans-serif; margin:0; color:#0f172a; background:#ffffff; }
    .wrap { max-width: 860px; margin: 0 auto; padding: 56px 20px; }
    .card { border:1px solid #e2e8f0; border-radius:16px; padding:24px; }
    h1 { margin:0 0 10px; font-size: 34px; }
    p { margin: 10px 0; line-height: 1.5; color:#334155; }
    a { color:#2563eb; text-decoration:none; }
    a:hover { text-decoration:underline; }
    .muted { color:#64748b; font-size: 14px; margin-top: 18px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Hit Rev Enterprises</h1>
      <p>We build <strong>PicLyst</strong> — visual organization using photos, notes, and links.</p>
      <p>Contact: <a href="mailto:hitrev@gmail.com">hitrev@gmail.com</a></p>
      <p class="muted">© <span id="y"></span> Hit Rev Enterprises, LLC</p>
    </div>
  </div>
  <script>document.getElementById('y').textContent = new Date().getFullYear();</script>
</body>
</html>
